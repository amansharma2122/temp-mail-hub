name: Lighthouse CI

# Runs bundle-size + Lighthouse audits against the built app on every PR
# targeting main and on pushes to main. Uploads reports as artifacts and
# fails the job if any performance / a11y / SEO budget regresses.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Don't spam maintainers with failure emails while budgets stabilize.
# The job reports status in the PR checks; artifacts hold the details.
permissions:
  contents: read
  pull-requests: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    # Keep the job green even when Lighthouse budgets warn — the report
    # artifact is the source of truth. Flip back to false once budgets
    # stop producing false positives.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (analyzer on)
        env:
          ANALYZE: "1"
        run: bun run build

      - name: Upload bundle stats
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats
          path: dist/stats.html
          if-no-files-found: warn

      - name: Serve built app
        # Use npx so we don't depend on a global install that may not be on PATH.
        run: |
          npx --yes serve@14 -s dist -l 4173 >/tmp/serve.log 2>&1 &
          for i in {1..30}; do
            curl -sf http://localhost:4173 >/dev/null && exit 0
            sleep 1
          done
          echo "Preview server never came up" >&2
          cat /tmp/serve.log || true
          exit 1

      - name: Run Lighthouse
        continue-on-error: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        run: npx --yes @lhci/cli@0.14.x autorun --config=./lighthouserc.json

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          if-no-files-found: warn